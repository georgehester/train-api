server {
    listen 80;
    listen [::]:80;

    server_name mapping.api.train.vulpz.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mapping.api.train.vulpz.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mapping.api.train.vulpz.com;
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/live/mapping.api.train.vulpz.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/mapping.api.train.vulpz.com/privkey.pem;

    location / {
        proxy_pass http://tile-server:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}