server {
    listen 80;
    listen [::]:80;

    server_name documentation.api.train.vulpz.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://documentation.api.train.vulpz.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name documentation.api.train.vulpz.com;
    server_tokens off;

    ssl_certificate /etc/nginx/ssl/live/api.train.vulpz.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.train.vulpz.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /documentation {
        proxy_pass http://application:8000/documentation;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}